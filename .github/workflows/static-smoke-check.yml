name: Static smoke check

on:
  push:
    branches:
      - main
      - copilot/**
  pull_request:

permissions:
  contents: read

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run static smoke check
        run: node scripts/smoke-check.mjs
