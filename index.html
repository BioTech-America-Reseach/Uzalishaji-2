<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 AI Facebook Poster + Picha</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #0f172a, #064e3b); min-height: 100vh; padding: 16px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .btn-primary { background: linear-gradient(135deg, #16a34a, #4ade80); color: white; font-weight: 700; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(74,222,128,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s; font-size: 13px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-danger { background: rgba(220,38,38,0.6); color: white; padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.3s; font-size: 13px; }
        .btn-danger:hover { background: rgba(220,38,38,0.8); }
        input, textarea, select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: white; width: 100%; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.1); }
        input[type="color"] { padding: 0; height: 38px; cursor: pointer; width: 50px; }
        input[type="range"] { padding: 0; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #4ade80; cursor: pointer; }
        .canvas-container { position: relative; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.3); min-height: 300px; }
        .canvas-container canvas { width: 100%; display: block; cursor: crosshair; }
        .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; margin: 4px 0; white-space: pre-wrap; word-wrap: break-word; }
        .chat-user { background: #16a34a; color: white; align-self: flex-end; }
        .chat-ai { background: rgba(255,255,255,0.08); color: #e5e7eb; align-self: flex-start; }
        .fade-up { animation: fadeUp 0.4s ease forwards; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }
        .status-info { color: #60a5fa; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #4ade80; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #4ade80, #16a34a); width: 0%; transition: width 0.5s; }
        .page-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; background: rgba(0,0,0,0.2); }
        .page-card:hover { border-color: rgba(74,222,128,0.3); }
        .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .countdown { font-size: 12px; color: #fbbf24; }
        .debug-box { background: rgba(0,0,0,0.6); border-radius: 8px; padding: 8px 12px; font-family: monospace; font-size: 11px; color: #4ade80; max-height: 120px; overflow-y: auto; margin-top: 6px; display: none; border: 1px solid rgba(74,222,128,0.2); }
        .debug-box .error { color: #f87171; }
        .debug-box .success { color: #4ade80; }
        .debug-box .info { color: #60a5fa; }
        .debug-box .warn { color: #fbbf24; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 9999; border-left: 4px solid #4ade80; max-width: 90%; animation: slideIn 0.3s ease; }
        .toast-error { border-left-color: #f87171; }
        .toast-success { border-left-color: #4ade80; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.hidden { display: none; }
        @media (max-width: 640px) { .schedule-grid { grid-template-columns: 1fr; } body { padding: 10px; } }
    </style>
</head>
<body>
    <div id="toast" class="toast hidden"></div>
    <div class="max-w-3xl mx-auto space-y-4">
        <header class="text-center fade-up">
            <h1 class="text-3xl md:text-4xl font-black" style="color: #4ade80;">🌿 AI Facebook Poster + Picha</h1>
            <p class="text-gray-400 text-sm md:text-base mt-1">Zalisha picha za AI • Chapisha kwenye Facebook Pages</p>
        </header>

        <details class="glass p-4" open>
            <summary class="cursor-pointer font-bold text-white text-lg flex items-center gap-2">⚙️ Settings — Pages, API &amp; Supabase</summary>
            <div class="mt-4 space-y-3">
                <div><label class="text-gray-300 text-sm block mb-1">🔑 AI API Key (Mistral)</label><input type="password" id="apiKey" placeholder="Ingiza API key yako..."></div>
                <div><label class="text-gray-300 text-sm block mb-1">🗄️ Supabase URL</label><input type="text" id="supabaseUrl" placeholder="https://your-project.supabase.co"></div>
                <div><label class="text-gray-300 text-sm block mb-1">🔐 Supabase Anon Key</label><input type="password" id="supabaseKey" placeholder="Supabase anon key..."></div>
                <button onclick="saveSettings()" class="btn-primary w-full">💾 Hifadhi Settings</button>
                <div id="settingsStatus" class="text-sm text-center hidden"></div>
                <hr class="border-white/10">
                <h3 class="text-white font-bold text-center">📄 Pages Zako za Facebook</h3>
                <div id="pagesList" class="space-y-2"></div>
                <div class="border border-white/10 rounded-lg p-3 space-y-2">
                    <input type="text" id="pageName" placeholder="Jina la Page">
                    <input type="text" id="pageId" placeholder="Page ID">
                    <input type="password" id="pageToken" placeholder="Access Token">
                    <button onclick="addPage()" class="btn-primary w-full" style="background: #2563eb;">➕ Ongeza Page</button>
                </div>
            </div>
        </details>

        <section class="glass p-4">
            <h2 class="text-white font-bold text-center text-lg">💬 Ongea na AI — Andaa Post</h2>
            <div id="chatMessages" class="space-y-2 max-h-60 overflow-y-auto pr-1 mt-3"></div>
            <form onsubmit="sendMessage(event)" class="flex gap-2 mt-3">
                <input type="text" id="chatInput" placeholder="Mfano: Andaa posti kuhusu biashara yangu..." class="flex-1">
                <button type="submit" class="btn-primary px-4">📤</button>
            </form>
        </section>

        <section class="glass p-4">
            <h2 class="text-white font-bold text-center text-lg">📝 Hariri Post Yako</h2>
            <textarea id="postText" rows="4" placeholder="Post itaonekana hapa..." class="resize-none mt-3"></textarea>
            <div class="flex flex-wrap gap-2 mt-3">
                <button onclick="document.getElementById('postText').value=''" class="btn-danger flex-1">🗑️ Futa</button>
                <button onclick="editPost()" class="btn-secondary flex-1">✏️ Hariri</button>
                <button onclick="regeneratePost()" class="btn-secondary flex-1">🔄 Boresha</button>
            </div>
        </section>

        <section class="glass p-4">
            <h2 class="text-white font-bold text-center text-lg">🖼️ Picha — AI Generate, Draw &amp; Edit</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                <div><label class="text-gray-300 text-sm block mb-1">📁 Pakia picha</label><input type="file" id="imageUpload" accept="image/*" class="file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-green-600 file:text-white file:font-semibold file:cursor-pointer file:text-sm"></div>
                <div class="space-y-2">
                    <label class="text-gray-300 text-sm block mb-1">🤖 Zalisha Picha</label>
                    <div class="flex gap-2">
                        <input type="text" id="aiPrompt" placeholder="Eleza picha unayotaka..." class="flex-1 text-sm">
                        <button onclick="generateAIImage()" class="btn-primary px-3 text-sm" style="background:linear-gradient(135deg,#9333ea,#db2777);">✨</button>
                        <button onclick="autoGenerateMrBeast()" class="btn-primary px-3 text-sm" style="background:linear-gradient(135deg,#d97706,#ea580c);">🎬</button>
                    </div>
                </div>
            </div>
            <div id="imageStatus" class="text-center text-sm hidden mt-2"></div>
            <div id="loadingIndicator" class="hidden text-center">
                <div class="loading-spinner"></div>
                <p class="text-gray-400 text-sm">Inazalisha picha...</p>
                <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
            </div>

            <div id="debugBox" class="debug-box"></div>

            <div class="flex flex-wrap gap-1 mt-3">
                <button onclick="setTool('select')" id="toolSelect" class="btn-tool active" style="background:rgba(255,255,255,0.08);color:#aaa;padding:6px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 0.3s;font-size:12px;">🖱️ Select</button>
                <button onclick="setTool('draw')" id="toolDraw" class="btn-tool" style="background:rgba(255,255,255,0.08);color:#aaa;padding:6px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 0.3s;font-size:12px;">✏️ Draw</button>
                <button onclick="setTool('erase')" id="toolErase" class="btn-tool" style="background:rgba(255,255,255,0.08);color:#aaa;padding:6px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 0.3s;font-size:12px;">🧹 Erase</button>
                <button onclick="clearCanvas()" class="btn-danger">🗑️ Clear</button>
                <input type="color" id="drawColor" value="#ff0000">
                <input type="range" id="drawSize" min="1" max="20" value="3" class="w-16">
                <span class="text-gray-400 text-xs flex items-center" id="drawSizeLabel">3</span>
            </div>

            <div class="border border-white/10 rounded-lg p-3 mt-3">
                <label class="text-gray-300 text-sm block font-semibold">✍️ Ongeza Text</label>
                <input type="text" id="overlayText" placeholder="Andika text hapa..." class="mb-2">
                <div class="flex flex-wrap gap-2 items-center">
                    <input type="color" id="textColor" value="#ffffff" class="w-8 h-8">
                    <input type="range" id="textSize" min="12" max="120" value="48" class="w-20">
                    <span class="text-gray-400 text-xs" id="textSizeLabel">48</span>
                    <label class="flex items-center gap-1 text-xs text-gray-400"><input type="checkbox" id="textBold" checked> Bold</label>
                    <button onclick="addTextOverlay()" class="btn-primary text-sm px-3" style="background:#2563eb;">➕ Ongeza</button>
                </div>
            </div>

            <div class="border border-white/10 rounded-lg p-3 mt-3">
                <label class="text-gray-300 text-sm block font-semibold">📷 Ongeza picha juu</label>
                <input type="file" id="layerUpload" accept="image/*" class="file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white file:font-semibold file:cursor-pointer file:text-sm">
            </div>

            <div class="canvas-container mt-3">
                <canvas id="mainCanvas" width="1200" height="630"></canvas>
            </div>

            <div class="flex flex-wrap gap-2 mt-3">
                <button onclick="downloadImage()" class="btn-primary flex-1">⬇️ Pakua</button>
                <button onclick="aiEnhanceText()" class="btn-secondary flex-1">✨ AI Pendekezo</button>
            </div>
        </section>

        <section class="glass p-4">
            <h2 class="text-white font-bold text-center text-lg">📅 Chapisha — Jipange Kila Page</h2>
            <div id="publishPages" class="space-y-2 mt-3"></div>
            <div id="publishInfo" class="text-center text-sm text-gray-400 mt-2"></div>
            <button onclick="publishPost()" class="btn-primary w-full mt-3" style="background: linear-gradient(135deg, #1d4ed8, #3b82f6);">🚀 Chapisha kwenye Pages</button>
            <div id="publishStatus" class="text-center text-sm hidden mt-3"></div>
        </section>
    </div>

    <script>
        // ========== STATE ==========
        let state = {
            pages: [],
            apiKey: '',
            supabaseUrl: '',
            supabaseKey: '',
            canvasImage: null,
            textOverlays: [],
            imageLayers: [],
            drawingPaths: [],
            currentTool: 'select',
            isDrawing: false,
            currentPath: null,
            conversation: [],
            pastPosts: []
        };

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        // ========== DEBUG ==========
        function debugLog(msg, type = 'info') {
            const box = document.getElementById('debugBox');
            box.style.display = 'block';
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, msg);
        }

        // ========== TOAST ==========
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        // ========== TOOLS ==========
        function setTool(tool) {
            state.currentTool = tool;
            document.querySelectorAll('.btn-tool').forEach(b => {
                b.style.background = 'rgba(255,255,255,0.08)';
                b.style.color = '#aaa';
                b.style.borderColor = 'transparent';
            });
            const map = { select: 'toolSelect', draw: 'toolDraw', erase: 'toolErase' };
            if (map[tool]) {
                const el = document.getElementById(map[tool]);
                el.style.background = '#4ade80';
                el.style.color = '#0f172a';
                el.style.borderColor = '#4ade80';
            }
            canvas.style.cursor = tool === 'select' ? 'grab' : 'crosshair';
        }

        document.getElementById('drawSize').addEventListener('input', function() {
            document.getElementById('drawSizeLabel').textContent = this.value;
        });
        document.getElementById('textSize').addEventListener('input', function() {
            document.getElementById('textSizeLabel').textContent = this.value;
        });

        // ========== RENDER ==========
        function renderCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (state.canvasImage) {
                ctx.drawImage(state.canvasImage, 0, 0, canvas.width, canvas.height);
            } else {
                const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                g.addColorStop(0, '#1a1a2e');
                g.addColorStop(1, '#16213e');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#555';
                ctx.font = '26px DM Sans';
                ctx.textAlign = 'center';
                ctx.fillText('📸 Pakia au zalisha picha', canvas.width/2, canvas.height/2);
            }

            state.imageLayers.forEach(l => {
                ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
            });

            state.drawingPaths.forEach(path => {
                if (path.points.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = path.color;
                ctx.lineWidth = path.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(path.points[0].x, path.points[0].y);
                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo(path.points[i].x, path.points[i].y);
                }
                ctx.stroke();
            });

            state.textOverlays.forEach(o => {
                ctx.save();
                ctx.font = `${o.bold ? '900' : '400'} ${o.size}px DM Sans`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.fillStyle = o.color;
                ctx.fillText(o.text, o.x, o.y);
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 3;
                ctx.strokeText(o.text, o.x, o.y);
                ctx.restore();
            });
        }

        // ========== IMAGE UPLOAD ==========
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    state.canvasImage = img;
                    renderCanvas();
                    showImageStatus('✅ Picha imepakiwa!', 'success');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('layerUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    state.imageLayers.push({ img: img, x: 50, y: 50, w: 250, h: 180 });
                    renderCanvas();
                    showImageStatus('✅ Picha imeongezwa!', 'success');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ========== TEXT OVERLAY ==========
        function addTextOverlay() {
            const text = document.getElementById('overlayText').value.trim();
            if (!text) { showImageStatus('⚠️ Andika maandishi', 'error'); return; }
            state.textOverlays.push({
                text: text,
                color: document.getElementById('textColor').value,
                size: parseInt(document.getElementById('textSize').value),
                bold: document.getElementById('textBold').checked,
                x: canvas.width / 2,
                y: canvas.height / 2
            });
            renderCanvas();
            document.getElementById('overlayText').value = '';
            showImageStatus('✅ Maandishi yameongezwa!', 'success');
        }

        function clearCanvas() {
            state.canvasImage = null;
            state.textOverlays = [];
            state.imageLayers = [];
            state.drawingPaths = [];
            renderCanvas();
            showImageStatus('🗑️ Picha imefutwa', 'info');
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'post-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function editPost() {
            document.getElementById('postText').focus();
            document.getElementById('postText').select();
        }

        // ========== STATUS ==========
        function showImageStatus(msg, type = 'info') {
            const el = document.getElementById('imageStatus');
            el.textContent = msg;
            el.className = `text-center text-sm mt-2 status-${type}`;
            el.classList.remove('hidden');
            if (type !== 'info') setTimeout(() => el.classList.add('hidden'), 6000);
        }

        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
            if (show) {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 10;
                    if (progress > 90) progress = 90;
                    document.getElementById('progressFill').style.width = progress + '%';
                    if (!show) clearInterval(interval);
                }, 400);
            }
        }

        // ========== AI IMAGE GENERATION ==========
        function generateAIImage() {
            const prompt = document.getElementById('aiPrompt').value.trim();
            if (!prompt) { showImageStatus('⚠️ Andika prompt', 'error'); return; }
            debugLog('🎨 Inazalisha picha kwa prompt: ' + prompt, 'info');
            
            showLoading(true);
            showImageStatus('🎨 Inazalisha picha...', 'info');
            
            const encodedPrompt = encodeURIComponent(prompt + ', professional, vibrant, high quality');
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1200&height=630&model=flux&enhance=true`;
            
            const img = new Image();
            let loaded = false;
            
            const timeout = setTimeout(() => {
                if (!loaded) {
                    showLoading(false);
                    showImageStatus('⏱️ Inachukua muda. Jaribu tena.', 'error');
                }
            }, 30000);
            
            img.onload = function() {
                loaded = true;
                clearTimeout(timeout);
                state.canvasImage = img;
                renderCanvas();
                showLoading(false);
                showImageStatus('✅ Picha imezalishwa!', 'success');
                debugLog('✅ Picha imepakuliwa', 'success');
            };
            
            img.onerror = function() {
                if (!loaded) {
                    clearTimeout(timeout);
                    showLoading(false);
                    showImageStatus('❌ Haiwezi kuzalisha. Jaribu prompt tofauti.', 'error');
                    debugLog('❌ Imeshindwa kupakua picha', 'error');
                }
            };
            
            img.crossOrigin = 'anonymous';
            img.src = imageUrl;
        }

        function autoGenerateMrBeast() {
            const postText = document.getElementById('postText').value.trim();
            if (!postText) { showImageStatus('⚠️ Andika post kwanza', 'error'); return; }
            document.getElementById('aiPrompt').value = postText + ', MrBeast style thumbnail, bold colors, dramatic lighting, eye-catching';
            generateAIImage();
        }

        // ========== AI ENHANCE TEXT ==========
        async function aiEnhanceText() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { showImageStatus('⚠️ Weka API Key', 'error'); return; }
            const postText = document.getElementById('postText').value.trim();
            if (!postText) { showImageStatus('⚠️ Andika post', 'error'); return; }
            
            showImageStatus('🧠 AI inapendekeza...', 'info');
            try {
                const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: [{
                            role: 'user',
                            content: `Kwa post: "${postText}", pendekeza maandishi mafupi (maneno 3-7) ya kuweka kwenye picha. Jibu text moja tu.`
                        }]
                    })
                });
                const json = await res.json();
                if (json.choices?.[0]) {
                    document.getElementById('overlayText').value = json.choices[0].message.content.trim();
                    showImageStatus('✅ AI imependekeza!', 'success');
                }
            } catch (err) { 
                showImageStatus('❌ ' + err.message, 'error');
            }
        }

        // ========== CHAT ==========
        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            
            addChatBubble(msg, 'user');
            state.conversation.push({ role: 'user', content: msg });
            
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { addChatBubble('⚠️ Weka API Key.', 'ai'); return; }
            
            addChatBubble('⏳ Inafikiri...', 'ai', 'thinking');
            
            try {
                const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: [{
                            role: 'system',
                            content: `Wewe ni mtaalamu wa Facebook posts. Andaa posts bila markdown, bila bold, bila asterisks. Jibu Kiswahili.`
                        }, ...state.conversation]
                    })
                });
                const json = await res.json();
                document.getElementById('thinking')?.remove();
                
                if (json.choices?.[0]) {
                    const reply = json.choices[0].message.content;
                    state.conversation.push({ role: 'assistant', content: reply });
                    addChatBubble(reply, 'ai');
                    document.getElementById('postText').value = reply;
                } else {
                    addChatBubble('❌ Jibu halikupatikana.', 'ai');
                }
            } catch (err) {
                document.getElementById('thinking')?.remove();
                addChatBubble('❌ ' + err.message, 'ai');
            }
        }

        function addChatBubble(text, role, id) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'chat-user' : 'chat-ai'}`;
            if (id) div.id = id;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function regeneratePost() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { showImageStatus('⚠️ Weka API Key', 'error'); return; }
            if (state.conversation.length === 0) { showImageStatus('⚠️ Ongea na AI', 'error'); return; }
            
            state.conversation.push({ role: 'user', content: 'Boresha post hiyo.' });
            try {
                const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: [{
                            role: 'system',
                            content: 'Mtaalamu wa posts. Bila markdown/bold/asterisks. Kiswahili.'
                        }, ...state.conversation]
                    })
                });
                const json = await res.json();
                if (json.choices?.[0]) {
                    const reply = json.choices[0].message.content;
                    state.conversation.push({ role: 'assistant', content: reply });
                    document.getElementById('postText').value = reply;
                    addChatBubble(reply, 'ai');
                }
            } catch (err) { showImageStatus('❌ ' + err.message, 'error'); }
        }

        // ========== PAGES ==========
        function renderPages() {
            const container = document.getElementById('pagesList');
            container.innerHTML = '';
            state.pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-black/20 rounded-lg px-3 py-2';
                div.innerHTML = `
                    <span class="text-white text-sm">${p.name || 'Page '+(i+1)} <span class="text-gray-500 text-xs">(${p.id})</span></span>
                    <button onclick="removePage(${i})" class="text-red-400 hover:text-red-300 text-sm">✕</button>
                `;
                container.appendChild(div);
            });
            renderPublishPages();
            updatePublishInfo();
            saveToLocalStorage();
        }

        function addPage() {
            const name = document.getElementById('pageName').value.trim();
            const id = document.getElementById('pageId').value.trim();
            const token = document.getElementById('pageToken').value.trim();
            if (!id || !token) { showSettingsStatus('⚠️ Weka Page ID na Token', 'error'); return; }
            state.pages.push({ name: name || 'Page', id, token });
            renderPages();
            document.getElementById('pageName').value = '';
            document.getElementById('pageId').value = '';
            document.getElementById('pageToken').value = '';
            showSettingsStatus('✅ Page imeongezwa!', 'success');
            showToast('✅ Page imeongezwa!', 'success');
        }

        function removePage(index) {
            state.pages.splice(index, 1);
            renderPages();
            saveToLocalStorage();
        }

        function renderPublishPages() {
            const container = document.getElementById('publishPages');
            container.innerHTML = '';
            state.pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'page-card';
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-white font-semibold text-sm">${p.name}</span>
                        <label class="flex items-center gap-1 text-xs text-gray-400">
                            <input type="checkbox" class="publish-toggle accent-green-500" data-idx="${i}" checked>
                            Chapisha
                        </label>
                    </div>
                    <div class="schedule-grid mt-2">
                        <div>
                            <label class="text-xs text-gray-500 block">📅 Tarehe</label>
                            <input type="date" class="publish-date w-full bg-black/40 border border-white/10 rounded px-2 py-1.5 text-white text-xs" data-idx="${i}">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 block">⏰ Saa</label>
                            <input type="time" class="publish-time w-full bg-black/40 border border-white/10 rounded px-2 py-1.5 text-white text-xs" data-idx="${i}">
                        </div>
                    </div>
                    <div class="countdown mt-1" id="countdown-${i}"></div>
                `;
                container.appendChild(div);
            });
            
            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            container.querySelectorAll('.publish-date').forEach(el => el.value = today);
            container.querySelectorAll('.publish-time').forEach(el => el.value = timeStr);
            
            updateCountdowns();
            setInterval(updateCountdowns, 60000);
        }

        function updateCountdowns() {
            document.querySelectorAll('.publish-toggle:checked').forEach(cb => {
                const idx = parseInt(cb.dataset.idx);
                const dateInput = document.querySelector(`.publish-date[data-idx="${idx}"]`);
                const timeInput = document.querySelector(`.publish-time[data-idx="${idx}"]`);
                if (dateInput && timeInput) {
                    const schedule = new Date(`${dateInput.value}T${timeInput.value}`);
                    const now = new Date();
                    const diff = schedule - now;
                    const el = document.getElementById(`countdown-${idx}`);
                    if (el) {
                        if (diff > 0) {
                            const hours = Math.floor(diff / 3600000);
                            const mins = Math.floor((diff % 3600000) / 60000);
                            el.textContent = `⏳ Muda uliobaki: ${hours}h ${mins}m`;
                            el.style.color = '#fbbf24';
                        } else if (diff > -60000) {
                            el.textContent = '🔴 Inachapishwa sasa...';
                            el.style.color = '#4ade80';
                        } else {
                            el.textContent = '✅ Imechapishwa';
                            el.style.color = '#4ade80';
                        }
                    }
                }
            });
        }

        function updatePublishInfo() {
            document.getElementById('publishInfo').textContent = state.pages.length > 0 ? 
                `📡 Post itaenda kwenye page ${state.pages.length}` : '⚠️ Ongeza page kwanza';
        }

        // ========== SETTINGS ==========
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            
            state.apiKey = apiKey;
            state.supabaseUrl = supabaseUrl;
            state.supabaseKey = supabaseKey;
            
            showSettingsStatus('✅ Mipangilio imehifadhiwa!', 'success');
            showToast('✅ Mipangilio imehifadhiwa!', 'success');
            saveToLocalStorage();
            
            if (supabaseUrl && supabaseKey) {
                loadPastPosts();
            }
        }

        function showSettingsStatus(msg, type) {
            const el = document.getElementById('settingsStatus');
            el.textContent = msg;
            el.className = `text-sm text-center mt-2 status-${type}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // ========== LOCAL STORAGE ==========
        function saveToLocalStorage() {
            try {
                const data = {
                    pages: state.pages,
                    conversation: state.conversation,
                    pastPosts: state.pastPosts,
                    apiKey: document.getElementById('apiKey').value,
                    supabaseUrl: document.getElementById('supabaseUrl').value,
                    supabaseKey: document.getElementById('supabaseKey').value
                };
                localStorage.setItem('ai_poster_data', JSON.stringify(data));
            } catch(e) { console.error('Save error:', e); }
        }

        function loadFromLocalStorage() {
            try {
                const raw = localStorage.getItem('ai_poster_data');
                if (!raw) return;
                const data = JSON.parse(raw);
                if (data.pages) state.pages = data.pages;
                if (data.conversation) state.conversation = data.conversation;
                if (data.pastPosts) state.pastPosts = data.pastPosts;
                if (data.apiKey) document.getElementById('apiKey').value = data.apiKey;
                if (data.supabaseUrl) document.getElementById('supabaseUrl').value = data.supabaseUrl;
                if (data.supabaseKey) document.getElementById('supabaseKey').value = data.supabaseKey;
            } catch(e) { console.error('Load error:', e); }
        }

        // ========== SUPABASE ==========
        async function loadPastPosts() {
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            if (!supabaseUrl || !supabaseKey) return;
            try {
                const res = await fetch(supabaseUrl + '/rest/v1/posts?order=created_at.desc&limit=30', {
                    headers: { 'apikey': supabaseKey, 'Authorization': 'Bearer ' + supabaseKey }
                });
                if (res.ok) {
                    state.pastPosts = await res.json();
                    saveToLocalStorage();
                }
            } catch(e) { console.error('Supabase error:', e); }
        }

        async function savePostToSupabase(content) {
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            if (!supabaseUrl || !supabaseKey) return;
            try {
                await fetch(supabaseUrl + '/rest/v1/posts', {
                    method: 'POST',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': 'Bearer ' + supabaseKey,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ content, created_at: new Date().toISOString() })
                });
                state.pastPosts.unshift({ content, created_at: new Date().toISOString() });
                saveToLocalStorage();
            } catch(e) { console.error('Save error:', e); }
        }

        // ========== GET CLEAN IMAGE DATA ==========
        function getCleanImageData() {
            // Create a clean canvas to avoid tainted canvas issues
            const cleanCanvas = document.createElement('canvas');
            cleanCanvas.width = canvas.width;
            cleanCanvas.height = canvas.height;
            const cleanCtx = cleanCanvas.getContext('2d');
            
            // Draw the current canvas content
            if (state.canvasImage) {
                cleanCtx.drawImage(state.canvasImage, 0, 0, cleanCanvas.width, cleanCanvas.height);
            }
            
            // Draw image layers
            state.imageLayers.forEach(l => {
                cleanCtx.drawImage(l.img, l.x, l.y, l.w, l.h);
            });
            
            // Draw text overlays
            state.textOverlays.forEach(o => {
                cleanCtx.font = `${o.bold ? '900' : '400'} ${o.size}px DM Sans`;
                cleanCtx.textAlign = 'center';
                cleanCtx.textBaseline = 'middle';
                cleanCtx.shadowColor = 'rgba(0,0,0,0.8)';
                cleanCtx.shadowBlur = 8;
                cleanCtx.shadowOffsetX = 3;
                cleanCtx.shadowOffsetY = 3;
                cleanCtx.fillStyle = o.color;
                cleanCtx.fillText(o.text, o.x, o.y);
                cleanCtx.shadowColor = 'transparent';
                cleanCtx.strokeStyle = 'rgba(0,0,0,0.5)';
                cleanCtx.lineWidth = 3;
                cleanCtx.strokeText(o.text, o.x, o.y);
            });
            
            return cleanCanvas;
        }

        // ========== PUBLISH ==========
        async function publishPost() {
            const btn = document.querySelector('[onclick="publishPost()"]');
            const postText = document.getElementById('postText').value.trim();
            
            if (!postText) { showPublishStatus('⚠️ Andika post!', 'error'); return; }
            if (state.pages.length === 0) { showPublishStatus('⚠️ Ongeza page!', 'error'); return; }
            
            btn.disabled = true;
            btn.textContent = '⏳ Inachapisha...';
            debugLog('🚀 Inaanza kuchapisha...', 'info');
            
            let successCount = 0;
            let errors = [];
            
            const toPublish = [];
            document.querySelectorAll('.publish-toggle:checked').forEach(cb => {
                const idx = parseInt(cb.dataset.idx);
                const dateInput = document.querySelector(`.publish-date[data-idx="${idx}"]`);
                const timeInput = document.querySelector(`.publish-time[data-idx="${idx}"]`);
                const dateStr = dateInput?.value || new Date().toISOString().split('T')[0];
                const timeStr = timeInput?.value || '12:00';
                toPublish.push({
                    page: state.pages[idx],
                    schedule: new Date(`${dateStr}T${timeStr}`)
                });
            });
            
            if (toPublish.length === 0) {
                showPublishStatus('⚠️ Chagua page!', 'error');
                btn.disabled = false;
                btn.textContent = '🚀 Chapisha kwenye Pages';
                return;
            }
            
            for (const { page, schedule } of toPublish) {
                try {
                    debugLog(`📤 Inachapisha kwenye ${page.name}...`, 'info');
                    
                    let photoId = null;
                    
                    // Check if there's an image to upload
                    if (state.canvasImage || state.textOverlays.length > 0 || state.imageLayers.length > 0) {
                        // Use clean canvas to avoid tainted canvas issues
                        const cleanCanvas = getCleanImageData();
                        
                        // Convert to blob
                        const blob = await new Promise(resolve => {
                            cleanCanvas.toBlob(resolve, 'image/jpeg', 0.9);
                        });
                        
                        if (blob) {
                            // Upload to Facebook
                            const photoForm = new FormData();
                            photoForm.append('source', blob, 'post.jpg');
                            photoForm.append('access_token', page.token);
                            photoForm.append('published', 'false');
                            
                            const photoRes = await fetch(`https://graph.facebook.com/v19.0/${page.id}/photos`, {
                                method: 'POST',
                                body: photoForm
                            });
                            const photoJson = await photoRes.json();
                            
                            if (photoJson.id) {
                                photoId = photoJson.id;
                                debugLog(`📸 Picha imepakiwa: ${photoId}`, 'success');
                            } else {
                                debugLog(`❌ Picha imeshindwa kupakiwa: ${photoJson.error?.message}`, 'error');
                            }
                        }
                    }
                    
                    // Create post
                    const feedForm = new FormData();
                    feedForm.append('message', postText);
                    feedForm.append('access_token', page.token);
                    if (photoId) {
                        feedForm.append('attached_media', JSON.stringify([{ media_fbid: photoId }]));
                    }
                    
                    const now = new Date();
                    const minScheduleTime = new Date(now.getTime() + 10 * 60000);
                    if (schedule >= minScheduleTime) {
                        feedForm.append('scheduled_publish_time', Math.floor(schedule.getTime() / 1000));
                        feedForm.append('published', 'false');
                        debugLog(`⏰ Imeratibiwa: ${schedule.toLocaleString()}`, 'info');
                    }
                    
                    const feedRes = await fetch(`https://graph.facebook.com/v19.0/${page.id}/feed`, {
                        method: 'POST',
                        body: feedForm
                    });
                    const feedJson = await feedRes.json();
                    
                    if (feedJson.id || feedJson.post_id) {
                        successCount++;
                        debugLog(`✅ Imechapishwa kwenye ${page.name}`, 'success');
                        showToast(`✅ Imechapishwa kwenye ${page.name}!`, 'success');
                    } else {
                        const errorMsg = feedJson.error?.message || 'Imeshindwa';
                        errors.push(`${page.name}: ${errorMsg}`);
                        debugLog(`❌ Imeshindwa kwenye ${page.name}: ${errorMsg}`, 'error');
                        showToast(`❌ ${page.name}: ${errorMsg}`, 'error');
                    }
                } catch (err) {
                    errors.push(`${page.name}: ${err.message}`);
                    debugLog(`❌ Kosa kwenye ${page.name}: ${err.message}`, 'error');
                    showToast(`❌ ${page.name}: ${err.message}`, 'error');
                }
            }
            
            btn.disabled = false;
            btn.textContent = '🚀 Chapisha kwenye Pages';
            
            if (successCount > 0) {
                showPublishStatus(`✅ Imechapishwa ${successCount}/${toPublish.length}!`, 'success');
                await savePostToSupabase(postText);
            }
            if (errors.length > 0) {
                setTimeout(() => showPublishStatus(`⚠️ ${errors.join(' | ')}`, 'error'), 2000);
            }
        }

        function showPublishStatus(msg, type) {
            const el = document.getElementById('publishStatus');
            el.textContent = msg;
            el.className = `text-center text-sm mt-2 status-${type}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // ========== CANVAS INTERACTION ==========
        let dragging = null;
        let dragLayer = null;

        function getCanvasPos(cx, cy) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (cx - rect.left) * (canvas.width / rect.width),
                y: (cy - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener('mousedown', function(e) {
            const pos = getCanvasPos(e.clientX, e.clientY);
            
            if (state.currentTool === 'select') {
                for (let i = state.textOverlays.length - 1; i >= 0; i--) {
                    const o = state.textOverlays[i];
                    ctx.font = `${o.bold ? '900' : '400'} ${o.size}px DM Sans`;
                    const metrics = ctx.measureText(o.text);
                    const w = metrics.width;
                    if (pos.x > o.x - w/2 - 15 && pos.x < o.x + w/2 + 15 &&
                        pos.y > o.y - o.size/2 - 15 && pos.y < o.y + o.size/2 + 15) {
                        dragging = { type: 'text', idx: i, offX: o.x - pos.x, offY: o.y - pos.y };
                        canvas.style.cursor = 'grabbing';
                        renderCanvas();
                        return;
                    }
                }
                for (let i = state.imageLayers.length - 1; i >= 0; i--) {
                    const l = state.imageLayers[i];
                    if (pos.x > l.x && pos.x < l.x + l.w && pos.y > l.y && pos.y < l.y + l.h) {
                        dragLayer = { idx: i, offX: l.x - pos.x, offY: l.y - pos.y };
                        canvas.style.cursor = 'grabbing';
                        renderCanvas();
                        return;
                    }
                }
            } else if (state.currentTool === 'draw') {
                state.isDrawing = true;
                state.currentPath = {
                    color: document.getElementById('drawColor').value,
                    size: parseInt(document.getElementById('drawSize').value),
                    points: [pos]
                };
                state.drawingPaths.push(state.currentPath);
                renderCanvas();
            } else if (state.currentTool === 'erase') {
                state.isDrawing = true;
                state.currentPath = {
                    color: '#1a1a2e',
                    size: parseInt(document.getElementById('drawSize').value) * 3,
                    points: [pos]
                };
                state.drawingPaths.push(state.currentPath);
                renderCanvas();
            }
        });

        canvas.addEventListener('mousemove', function(e) {
            const pos = getCanvasPos(e.clientX, e.clientY);
            
            if (dragging) {
                state.textOverlays[dragging.idx].x = pos.x + dragging.offX;
                state.textOverlays[dragging.idx].y = pos.y + dragging.offY;
                renderCanvas();
            } else if (dragLayer) {
                state.imageLayers[dragLayer.idx].x = pos.x + dragLayer.offX;
                state.imageLayers[dragLayer.idx].y = pos.y + dragLayer.offY;
                renderCanvas();
            } else if (state.isDrawing && state.currentPath) {
                state.currentPath.points.push(pos);
                renderCanvas();
            }
        });

        canvas.addEventListener('mouseup', function() {
            dragging = null;
            dragLayer = null;
            state.isDrawing = false;
            state.currentPath = null;
            canvas.style.cursor = state.currentTool === 'select' ? 'grab' : 'crosshair';
        });

        canvas.addEventListener('mouseleave', function() {
            dragging = null;
            dragLayer = null;
            state.isDrawing = false;
            state.currentPath = null;
        });

        // Touch support
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            const me = new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY });
            canvas.dispatchEvent(me);
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            const me = new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY });
            canvas.dispatchEvent(me);
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            const me = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(me);
        }, { passive: false });

        // ========== INIT ==========
        loadFromLocalStorage();
        renderCanvas();
        renderPages();
        setTool('select');
        
        debugLog('🚀 AI Poster Pro imeanzishwa!', 'success');
        debugLog('💾 Data inahifadhiwa kwenye localStorage', 'info');
        
        console.log('🌿 AI Poster Pro imeanzishwa!');
        console.log('✅ Tatizo la tainted canvas limetatuliwa!');
    </script>
